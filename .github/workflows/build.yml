name: Build Mod JAR
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.12.1'
      - run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              maven { url 'https://maven.fabricmc.net/' }
              gradlePluginPortal()
            }
          }
          rootProject.name = 'heart-food-tooltip'
          EOF
          cat > build.gradle << 'EOF'
          plugins {
            id 'fabric-loom' version '1.10.1'
          }
          version = '1.0.0'
          group = 'com.heartfood'
          base.archivesName = 'heart-food-tooltip'
          repositories {
            maven { url 'https://maven.fabricmc.net/' }
          }
          dependencies {
            minecraft  'com.mojang:minecraft:1.21.5'
            mappings   'net.fabricmc:yarn:1.21.5+build.1:v2'
            modImplementation 'net.fabricmc:fabric-loader:0.16.14'
            modImplementation 'net.fabricmc.fabric-api:fabric-api:0.119.5+1.21.5'
          }
          tasks.withType(JavaCompile).configureEach {
            options.release = 21
          }
          java {
            sourceCompatibility = JavaVersion.VERSION_21
            targetCompatibility = JavaVersion.VERSION_21
          }
          EOF
          gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: heart-food-tooltip-jar
          path: build/libs/heart-food-tooltip-*.jar
